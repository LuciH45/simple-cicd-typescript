<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
</head>
<body>
  <h1>Calculator</h1>

  <input type="number" id="num1" placeholder="First number" />

  <select id="operation">
    <option value="+">+</option>
    <option value="-">−</option>
    <option value="*">×</option>
    <option value="/">÷</option>
  </select>

  <input type="number" id="num2" placeholder="Second number" />

  <button type="button" id="btnCalc">Calculate</button>

  <p>Result: <strong id="result">—</strong></p>

  <!-- Compiled JS files: tsc sum.ts subtract.ts multiply.ts divide.ts -->
  <script src="sum.js"></script>
  <script src="subtract.js"></script>
  <script src="multiply.js"></script>
  <script src="divide.js"></script>

  <script>
    document.getElementById('btnCalc').addEventListener('click', function () {
      var a = Number(document.getElementById('num1').value) || 0;
      var b = Number(document.getElementById('num2').value) || 0;
      var op = document.getElementById('operation').value;
      var result;

      try {
        if      (op === '+') result = sum(a, b);
        else if (op === '-') result = subtract(a, b);
        else if (op === '*') result = multiply(a, b);
        else if (op === '/') result = divide(a, b);

        document.getElementById('result').textContent = result;
      } catch (err) {
        document.getElementById('result').textContent = 'Error: ' + err.message;
      }
    });
  </script>
</body>
</html>
